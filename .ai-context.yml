# Dieses Repo ist Teil des Heimgewebes.
# Systemweiter Kontext durch Heimgeist:
#   metarepo/ai-contexts/heimgeist.ai-context.yml

system_context:
  heimgeist: "../metarepo/ai-contexts/heimgeist.ai-context.yml"

ai_context_version: 1.1

project:
  name: heimlern
  summary: Retrospective learning and policy-adaptation proposal engine (Rust)
  role: learning_proposal_engine
  primary_language: rust
  visibility: internal

heimgewebe:
  axis:
    - Decisions
    - Learning
    - Contracts
  fleet:
    enabled: true
  wgx:
    profile_expected: true
    guard_smoke_expected: true

role_contract:
  name: learning_proposal_engine
  authority: retrospective_analysis_only
  owns:
    - learning_reports
    - weight_adjustment_proposals
    - reproducibility_metadata
  consumes:
    - historical_outcomes
    - completion_truth
    - run_receipts
    - metrics
  produces:
    - gated_learning_reports
    - non_applying_weight_proposals
  limits:
    - no_task_ownership
    - no_ledger_writes
    - no_silent_weight_changes
  unavailable_effect: existing_rules_remain_static

interfaces:
  consumes:
    - "event.line"
    - "contracts"
    - "historical outcomes"
    - "completion truth and run receipts"
  produces:
    - "learning_reports"
    - "weight_adjustment_proposals"

contracts:
  schemas:
    - path: "contracts/*.schema.json"
      note: "Validate against canonical contracts."

dependencies:
  internal:
    - name: chronik
      relationship: uses
      interface:
        - event_feed
        - metrics
    - name: contracts
      relationship: uses
      interface:
        - json_schema
    - name: metarepo
      relationship: uses
      interface: [docs, templates]
  external:
    - name: pydantic
    - name: pandas
    - name: bash
      version: ">=4"

architecture:
  entrypoints:
    - crates/heimlern-bandits/examples/decide.rs
    - crates/heimlern-bandits/src/lib.rs
  key_paths:
    - path: src/scoring/
      purpose: quality scoring & policy checks
    - path: docs/
      purpose: "Operator docs / ADRs"
  data_flow:
    input: events/metrics from chronik
    processing: scoring + feedback
    output: reports/signals

boundaries:
  not_responsible_for:
    - "Defining canonical schemas (metarepo/contracts do that)."
    - "Applying policy or weight changes without an explicit gate."
    - "Owning tasks, execution, leases or event history."
  dangerous_assumptions:
    - "Treat style as policy without explicit rule."
    - "Treat a learning proposal as an applied policy change."
    - "Let heimlern own tasks, execution or event history."

conventions:
  branching: "main, feature/*"
  commit_prefix: "heimlern"
  ci_platform: github_actions

documentation:
  adr: docs/adr/
  runbook: docs/runbook.md

ai_guidance:
  do:
    - log model versions and seeds for reproducibility
    - "Start with entrypoints and key_paths."
    - "Prefer contract-compatible changes."
  dont:
    - change scoring semantics without a version bump
    - "Invent missing schemas."
    - "Change repo role without updating ai-context."
