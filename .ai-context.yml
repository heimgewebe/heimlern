# Dieses Repo ist Teil des Heimgewebes.
# Systemweiter Kontext durch Heimgeist:
#   metarepo/ai-contexts/heimgeist.ai-context.yml

system_context:
  heimgeist: "../metarepo/ai-contexts/heimgeist.ai-context.yml"

ai_context_version: 1.1

project:
  name: heimlern
  summary: Historical reference for retired retrospective learning and policy-proposal experiments (Rust)
  role: historical_learning_reference
  lifecycle: historical
  primary_language: rust
  visibility: internal

heimgewebe:
  axis:
    - Decisions
    - Learning
    - Contracts
  fleet:
    enabled: false
  wgx:
    profile_expected: true
    guard_smoke_expected: true

role_contract:
  name: historical_learning_reference
  authority: none
  owns:
    - historical_implementation_evidence
    - historical_contract_examples
  consumes: []
  produces: []
  limits:
    - no_task_ownership
    - no_ledger_writes
    - no_policy_or_weight_changes
    - no_runtime_or_routing_authority
    - no_claim_of_evaluator_usefulness
  unavailable_effect: no_active_system_effect

interfaces:
  consumes: []
  produces: []

contracts:
  schemas:
    - path: "contracts/*.schema.json"
      note: "Validate against canonical contracts."

dependencies:
  internal:
    - name: chronik
      relationship: uses
      interface:
        - event_feed
        - metrics
    - name: contracts
      relationship: uses
      interface:
        - json_schema
    - name: metarepo
      relationship: uses
      interface: [docs, templates]
  external:
    - name: pydantic
    - name: pandas
    - name: bash
      version: ">=4"

architecture:
  entrypoints:
    - crates/heimlern-bandits/examples/decide.rs
    - crates/heimlern-bandits/src/lib.rs
  key_paths:
    - path: src/scoring/
      purpose: quality scoring & policy checks
    - path: docs/
      purpose: "Operator docs / ADRs"
  data_flow:
    input: historical fixtures and retained examples only
    processing: no active processing; code retained for audit
    output: no active outputs

boundaries:
  not_responsible_for:
    - "Active learning, evaluation, routing, friction analysis or policy adaptation."
    - "Defining canonical schemas or operating a runtime service."
    - "Applying policy or weight changes."
    - "Owning tasks, execution, leases or event history."
  dangerous_assumptions:
    - "Treat style as policy without explicit rule."
    - "Treat a learning proposal as an applied policy change."
    - "Let heimlern own tasks, execution or event history."

conventions:
  branching: "main, feature/*"
  commit_prefix: "heimlern"
  ci_platform: github_actions

documentation:
  adr: docs/adr/
  runbook: docs/runbook.md

ai_guidance:
  do:
    - "Treat the repository as historical evidence and preserve existing reproducibility metadata."
    - "Use Vibe-Lab for any newly registered evaluation design."
  dont:
    - "Start feature development without a separately registered usefulness proof."
    - "Promote the existing analyzers as an evaluator, routing layer or runtime service."
    - "Invent observations or reinterpret the blocked Vibe-Lab experiment as an effectiveness result."
