name: rust (cached)
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Exakte Rust Toolchain Version"
        required: false
        default: "stable"
        type: string

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for main-branch action references
        uses: ./.github/actions/check-main-refs
      - uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: ${{ inputs.toolchain || 'stable' }}
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all --locked --workspace --verbose
      - name: "smoke: run decide example"
        run: cargo run -p heimlern-bandits --example decide --quiet

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: Install jsonschema
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate sample JSONs
        run: |
          python scripts/validate_json.py \
          --schemas contracts/ \
          --samples data/samples/
      - name: Reject invalid feedback fixture
        run: |
          if python scripts/validate_json.py contracts/policy.feedback.schema.json data/samples/policy.feedback.rejected.json; then
            echo "::error::policy.feedback.rejected.json was accepted unexpectedly"
            exit 1
          fi
      - name: Smoke OPLEARN adapter
        run: |
          python scripts/ola_adapter.py --self-test
          for input in tests/fixtures/ola/*.ok.json; do
            python scripts/ola_adapter.py "$input" > /tmp/ola-routing-outcome.json
            python scripts/validate_json.py contracts/operator.routing_outcome.v1.schema.json /tmp/ola-routing-outcome.json
            python scripts/ola_adapter.py --emit decision-outcome "$input" > /tmp/ola-decision-outcome.json
          done
          python scripts/ola_probe.py --self-test
          python scripts/ola_probe.py > /tmp/ola-probe.json
          python -m json.tool /tmp/ola-probe.json >/dev/null

      - name: Validate weight adjustment fixture against metarepo contract
        run: |
          mkdir -p .ci
          curl -fsSL https://raw.githubusercontent.com/heimgewebe/metarepo/a1984186a98a1e4214769f87649c5affc9686a53/contracts/policy.weight_adjustment.v1.schema.json \
            -o .ci/policy.weight_adjustment.v1.schema.json
          python scripts/validate_json.py \
            .ci/policy.weight_adjustment.v1.schema.json \
            tests/fixtures/feedback/adjustment.ok.json
          python - <<'PY'
          import json
          from pathlib import Path
          failed = json.loads(Path("tests/fixtures/ola/failed.ok.json").read_text(encoding="utf-8"))
          amplified = [failed | {"decision_id": f"gr-failed-{i:03d}", "route_used": "direct" + ":" + "patch"} for i in range(10)]
          Path("/tmp/ola-amplified.json").write_text(json.dumps(amplified), encoding="utf-8")
          PY
          python scripts/ola_probe.py --min-decisions 10 --emit proposal /tmp/ola-amplified.json > /tmp/ola-proposal.json
          python - <<'PY'
          import json
          from pathlib import Path
          allowed_delta_key_chars = set("ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789._-")
          proposal = json.loads(Path("/tmp/ola-proposal.json").read_text(encoding="utf-8"))
          assert set(proposal["deltas"]) == {"route.direct_patch.weight"}
          assert all(set(key) <= allowed_delta_key_chars for key in proposal["deltas"])
          PY
          python scripts/validate_json.py \
            .ci/policy.weight_adjustment.v1.schema.json \
            /tmp/ola-proposal.json
