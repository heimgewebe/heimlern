name: rust (cached)
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Exakte Rust Toolchain Version"
        required: false
        default: "stable"
        type: string

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for main-branch action references
        uses: ./.github/actions/check-main-refs
      - uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: ${{ inputs.toolchain || 'stable' }}
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all --locked --workspace --verbose
      - name: "smoke: run decide example"
        run: cargo run -p heimlern-bandits --example decide --quiet

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-tools.txt
      - name: Validate sample JSONs
        run: |
          python scripts/validate_json.py \
          --schemas contracts/ \
          --samples data/samples/
      - name: Validate archive readiness and contract authority
        run: python scripts/validate_archive_readiness.py
      - name: Validate active proposal registrations
        run: python scripts/validate_proposal_registrations.py
      - name: Test proposal registration gate
        run: python -m pytest -q tests/test_proposal_registrations.py
      - name: Test RepoBrief doc-freshness registry contract
        run: python -m pytest -q tests/test_doc_freshness_registry.py
      - name: Reject invalid feedback fixture
        run: |
          if python scripts/validate_json.py contracts/policy.feedback.schema.json data/samples/policy.feedback.rejected.json; then
            echo "::error::policy.feedback.rejected.json was accepted unexpectedly"
            exit 1
          fi
      - name: Smoke OPLEARN adapter
        run: |
          python scripts/ola_adapter.py --self-test
          for input in tests/fixtures/ola/*.ok.json; do
            python scripts/ola_adapter.py "$input" > /tmp/ola-routing-outcome.json
            python scripts/validate_json.py contracts/operator.routing_outcome.v1.schema.json /tmp/ola-routing-outcome.json
            python scripts/ola_adapter.py --emit decision-outcome "$input" > /tmp/ola-decision-outcome.json
          done
          python scripts/ola_probe.py --self-test
          python scripts/ola_probe.py > /tmp/ola-probe.json
          python -m json.tool /tmp/ola-probe.json >/dev/null

      - name: Validate review-only Chronik outcome consumer
        run: |
          python -m pytest -q tests/test_chronik_outcome_consumer.py
          python scripts/chronik_outcome_consumer.py \
            --review-time 2026-07-10T23:00:00Z \
            --max-age-seconds 7200 \
            tests/fixtures/chronik-outcome/operator-routing-outcome-export.v1.json \
            > /tmp/chronik-outcome-consumer-report.json
          python -c "import json; r=json.load(open('/tmp/chronik-outcome-consumer-report.json', encoding='utf-8')); assert r['status']=='insufficient_evidence'; assert r['review_only'] is True; assert r['writes']==[]"

      - name: Validate weight adjustment coherence against the pinned metarepo mirror
        run: |
          python scripts/validate_weight_adjustment_coherence.py \
            --schema contracts/mirrors/metarepo/policy.weight_adjustment.v1.schema.json
          python scripts/ola_circle_smoke.py \
            --schema contracts/mirrors/metarepo/policy.weight_adjustment.v1.schema.json
